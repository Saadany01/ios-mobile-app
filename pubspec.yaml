name: sign_language_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  cloud_functions: ^6.0.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  image_picker: ^1.1.2
  http: ^1.2.2
  otp: ^3.1.4
  qr_flutter: ^4.1.0
  flutter_webrtc: ^0.14.2
  flutter_local_notifications: ^19.4.2
  open_file: ^3.5.10
  path_provider: ^2.1.4
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/